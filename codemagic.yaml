workflows:
  android-workflow:
    name: Android Workflow
    max_build_duration: 30
    environment:
      flutter: stable

    scripts:
      - name: Create Flutter project
        script: |
          flutter create .
      - name: Build APK
        script: |
          flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
